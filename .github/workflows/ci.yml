name: CI Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:

  lint:
    name: Lint & Format
    uses: ./.github/workflows/format-lint.yml

  type-check:
    name: Type Check
    uses: ./.github/workflows/type-check.yml

  unit-tests:
    name: Unit Tests
    needs: [lint, type-check]
    uses: ./.github/workflows/unit-tests.yml
